name: Deploy to GitHub Pages

# Enables Pages (if not already on) and publishes the repo root as the site.
# The air-gap decoder is then served over HTTPS at /airgap-decoder.html — which
# is what iOS Safari requires before it will grant microphone access.

on:
  push:
    branches: ["claude/linen-procession-decoder-iphone-4mp768"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Configure Pages (enable if needed)
        uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
